<html>
<html>
<head>
<title>Student Object Program</title>
</head>
<body>

<h2>Enter Student Details</h2>

Student ID: <input type="number" id="id"><br><br>
Name: <input type="text" id="name"><br><br>
Department: <input type="text" id="dept"><br><br>
Marks: <input type="number" id="marks"><br><br>

<button onclick="showDetails()">Submit</button>

<pre id="output"></pre>

<script>
function showDetails(){

const student = {
    id: document.getElementById("id").value,
    name: document.getElementById("name").value,
    department: document.getElementById("dept").value,
    marks: Number(document.getElementById("marks").value)
};

const {id, name, department, marks} = student;

let grade = marks >= 90 ? "A" : "B";


const updatedStudent = {
    ...student,
    grade: grade
};

let result = `${id} ${name} ${department} ${marks}\n`;
result += JSON.stringify(updatedStudent, null, 2);

document.getElementById("output").textContent = result;
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Student Marks Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>Student Marks Calculator</h2>

    <input type="text" id="name" placeholder="Enter Student Name">

    <input type="number" id="m1" placeholder="Enter Marks 1">

    <input type="number" id="m2" placeholder="Enter Marks 2">

    <input type="number" id="m3" placeholder="Enter Marks 3">

    <button onclick="calculate()">Calculate</button>

    <p id="result"></p>
</div>

<script src="script.js"></script>

</body>
</html>
